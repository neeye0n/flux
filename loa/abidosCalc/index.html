
<style>
  :root {
    --ctp-base: #1e1e2e;
    --ctp-mantle: #181825;
    --ctp-surface0: #313244;
    --ctp-surface1: #45475a;
    --ctp-surface2: #585b70;
    --ctp-overlay1: #7f849c;
    --ctp-text: #cdd6f4;
    --ctp-subtext0: #a6adc8;
    --ctp-subtext1: #bac2de;
    --ctp-lavender: #b4befe;
    --ctp-teal: #94e2d5;
    --ctp-peach: #fab387;
    --ctp-blue: #89b4fa;
    --ctp-green: #a6e3a1;
    --ctp-gray-mat: #9399b2;
    --ctp-harvest-gold: #eab308;
    --ctp-mauve: #cba6f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--ctp-base); color: var(--ctp-text); font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  .wrap { max-width: 860px; margin: 0 auto; padding: 2rem 1rem; }
  .card { background: var(--ctp-mantle); border: 1px solid var(--ctp-surface0); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.25rem; }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
  .header svg { color: var(--ctp-peach); }
  .header h1 { font-size: 1.875rem; font-weight: 700; color: var(--ctp-text); }
  .inputs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .c-normal { color: var(--ctp-gray-mat); }
  .c-uncommon { color: var(--ctp-green); }
  .c-abidos { color: var(--ctp-blue); }
  .c-rest { color: var(--ctp-subtext1); }
  .c-powder {color: var(--ctp-harvest-gold); }
  input[type=number] { width: 100%; background: var(--ctp-surface0); border: 2px solid var(--ctp-surface1); color: var(--ctp-text); border-radius: 8px; padding: 8px 16px; font-size: 14px; outline: none; transition: border-color 0.15s; }
  input[type=number]:focus { border-color: var(--ctp-blue); box-shadow: 0 0 0 2px rgba(203,166,247,0.3); }
  .stat-card { background: var(--ctp-surface0); border-radius: 10px; padding: 0.75rem 1rem; text-align: center; }
  .stat-label { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .stat-val { font-size: 1.5rem; font-weight: 700; color: var(--ctp-peach); }
  /* .result-hero { background: var(--ctp-surface0); border: 1px solid var(--ctp-blue); border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 12px; }
  .result-hero-num { font-size: 3rem; font-weight: 700; color: var(--ctp-blue); }
  .result-hero-label { font-size: 1rem; color: var(--ctp-subtext1); } */
  .result-hero { background: linear-gradient(135deg, var(--ctp-mauve) 0%, var(--ctp-peach) 100%); border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 12px; }
  .result-hero-num { font-size: 3rem; font-weight: 700; color: var(--ctp-base); }
  .result-hero-label { font-size: 1.25rem; font-weight: 700; color: var(--ctp-base); opacity: 0.85; }
  .two-col { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
  .panel { background: var(--ctp-surface0); border-radius: 12px; padding: 1.25rem; border: 2px solid var(--ctp-surface1); }
  .panel-title { font-size: 1.125rem; font-weight: 700; color: var(--ctp-text); margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }
  .panel-title svg { color: var(--ctp-lavender); }
  .exchange-item { background: var(--ctp-base); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .exchange-item p { font-size: 0.875rem; font-weight: 600; color: var(--ctp-text); margin-bottom: 2px; }
  .exchange-item .sub { font-size: 0.75rem; font-weight: 400; color: var(--ctp-subtext0); }
  .exchange-item .arrow { font-size: 0.75rem; color: var(--ctp-teal); }
  .resource-row { display: flex; justify-content: space-between; align-items: center; background: var(--ctp-base); border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; font-size: 0.875rem; }
  .resource-row span:first-child { color: var(--ctp-subtext1); }
  .resource-row .val { font-weight: 600; color: var(--ctp-text); }
  .resource-row em { font-style: italic; color: var(--ctp-overlay1); font-size: 0.75rem; margin-left: 4px; }
  .req-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .section-title { font-size: 1.125rem; font-weight: 700; color: var(--ctp-text); margin-bottom: 1rem; }
  .no-exchange { font-size: 0.875rem; color: var(--ctp-subtext0); padding: 8px 0; }
</style>

<div class="wrap">
  <div class="card">
    <div class="header">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <h1>Abidos Fusion Material Crafting Calculator</h1>
    </div>

    <div class="inputs-grid">
      <div>
        <label><span class="c-normal">Normal</span> <span class="c-rest">Material</span></label>
        <input id="normal" type="number" value="11425">
      </div>
      <div>
        <label><span class="c-uncommon">Uncommon</span> <span class="c-rest">Material</span></label>
        <input id="uncommon" type="number" value="2935">
      </div>
      <div>
        <label><span class="c-abidos">Abidos</span> <span class="c-rest">Material</span></label>
        <input id="abidosRare" type="number" value="755">
      </div>
      <div>
        <label><span class="c-rest">Lifeskill</span> <span class="c-powder">Powder</span></label>
        <input id="powders" type="number" value="20">
      </div>
    </div>

    <div id="result-container"></div>
  </div>

  <div class="card">
    <p class="section-title">Crafting Requirements (per craft)</p>
    <div class="req-grid">
      <div class="stat-card">
        <p class="stat-label"><span class="c-normal">Normal</span> <span class="c-rest">Material</span></p>
        <p class="stat-val">86</p>
      </div>
      <div class="stat-card">
        <p class="stat-label"><span class="c-uncommon">Uncommon</span> <span class="c-rest">Material</span></p>
        <p class="stat-val">45</p>
      </div>
      <div class="stat-card">
        <p class="stat-label"><span class="c-abidos">Abidos</span> <span class="c-rest">Material</span></p>
        <p class="stat-val">33</p>
      </div>
    </div>
  </div>

  <div class="card">
    <p class="section-title">Bulk Crafting Requirements (per 4 rows)</p>
    <div class="req-grid">
      <div class="stat-card">
        <p class="stat-label"><span class="c-normal">Normal</span> <span class="c-rest">Material</span></p>
        <p class="stat-val">4480</p>
      </div>
      <div class="stat-card">
        <p class="stat-label"><span class="c-uncommon">Uncommon</span> <span class="c-rest">Material</span></p>
        <p class="stat-val">2360</p>
      </div>
      <div class="stat-card">
        <p class="stat-label"><span class="c-abidos">Abidos</span> <span class="c-rest">Material</span></p>
        <p class="stat-val">1720</p>
      </div>
    </div>
  </div>
</div>

<script>
  const CRAFT_REQ = { normal: 86, uncommon: 45, abidosRare: 33 };

  ['normal','uncommon','abidosRare','powders'].forEach(id =>
    document.getElementById(id).addEventListener('input', calculateOptimal)
  );

  function calculateOptimal() {
    const normal = parseInt(document.getElementById('normal').value) || 0;
    const uncommon = parseInt(document.getElementById('uncommon').value) || 0;
    const abidosRare = parseInt(document.getElementById('abidosRare').value) || 0;
    const powders = parseInt(document.getElementById('powders').value) || 0;

    let maxCrafts = 0, best = null;
    const maxNB = Math.floor(normal / 100);
    const maxUB = Math.floor(uncommon / 50);

    for (let tb = 0; tb <= maxNB; tb++) {
      for (let ttb = 0; ttb <= maxUB; ttb++) {
        const remNormal = normal - tb * 100;
        const remUncommon = uncommon - ttb * 50;
        const totalPowders = powders + tb * 80 + ttb * 80;
        const abidosBatches = Math.floor(totalPowders / 100);
        const remPowders = totalPowders - abidosBatches * 100;
        const totalAbidos = abidosRare + abidosBatches * 10;
        const crafts = Math.min(
          Math.floor(remNormal / 86),
          Math.floor(remUncommon / 45),
          Math.floor(totalAbidos / 33)
        );
        if (crafts > maxCrafts) {
          maxCrafts = crafts;
          best = { tb, ttb, abidosBatches, abidosGained: abidosBatches * 10,
            remNormal, remUncommon, totalAbidos, remPowders, crafts };
        }
      }
    }

    const container = document.getElementById('result-container');
    if (!best) { container.innerHTML = ''; return; }

    const lr = best.remNormal - best.crafts * 86;
    const lu = best.remUncommon - best.crafts * 45;
    const la = best.totalAbidos - best.crafts * 33;

    container.innerHTML = `
      <div class="result-hero">
        <div>
          <p class="result-hero-label">Maximum Crafts Possible</p>
          <p class="result-hero-num">${best.crafts}</p>
        </div>
      </div>
      <div class="two-col">
        <div class="panel">
          <p class="panel-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" y1="9" x2="6" y2="21"/></svg>
            Optimal Exchange Strategy
          </p>
          ${best.tb > 0 ? `<div class="exchange-item"><p>Convert <span class="c-normal">Normal</span> Material:</p><p class="sub">${best.tb} batches (${best.tb * 100} mats)</p><p class="arrow">→ ${best.tb * 80} Lifeskill Powder</p></div>` : ''}
          ${best.ttb > 0 ? `<div class="exchange-item"><p>Convert <span class="c-uncommon">Uncommon</span> Material:</p><p class="sub">${best.ttb} batches (${best.ttb * 50} mats)</p><p class="arrow">→ ${best.ttb * 80} Lifeskill Powder</p></div>` : ''}
          ${best.abidosBatches > 0 ? `<div class="exchange-item"><p>Convert Lifeskill <span class="c-powder">Powder</span>:</p><p class="sub">${best.abidosBatches} batches (${best.abidosBatches * 100} powder)</p><p class="arrow">→ ${best.abidosGained} <span class="c-abidos">Abidos</span> Material</p></div>` : ''}
          ${best.tb === 0 && best.ttb === 0 && best.abidosBatches === 0 ? `<p class="no-exchange">No exchanges needed.</p>` : ''}
        </div>
        <div class="panel">
          <p class="panel-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
            Final Resources
          </p>
          <div class="resource-row"><span><span class="c-normal">Normal</span> Material:</span><span class="val">${best.remNormal} <em>(${lr} left)</em></span></div>
          <div class="resource-row"><span><span class="c-uncommon">Uncommon</span> Material:</span><span class="val">${best.remUncommon} <em>(${lu} left)</em></span></div>
          <div class="resource-row"><span><span class="c-abidos">Abidos</span> Material:</span><span class="val">${best.totalAbidos} <em>(${la} left)</em></span></div>
          <div class="resource-row"><span>Lifeskill Powder:</span><span class="val">${best.remPowders}</span></div>
        </div>
      </div>`;
  }

  calculateOptimal();
</script>
